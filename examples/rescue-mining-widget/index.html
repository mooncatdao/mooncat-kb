<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MoonCat Rescue Mining Widget Example</title>
    <link rel="stylesheet" href="rescue-mining-widget.css">
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #000011;
      }
    </style>
  </head>
  <body>
    <div id="mooncat-miner"></div>
    <script src="vendor/sha3.min.js"></script>
    <script src="vendor/mooncatparser.js"></script>
    <script src="mooncat-render-adapter.js"></script>
    <script src="rescue-mining-widget.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const miner = mountMoonCatRescueMiner("#mooncat-miner", {
        difficultyPrefix: params.get("difficultyPrefix") || "000000",
        knownRescuedCatIds: []
      });
      if (params.get("autostart") === "1") {
        miner.start();
      }
    </script>
  </body>
</html>
